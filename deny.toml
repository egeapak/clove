# cargo-deny configuration — license and advisory gating for the workspace.
# See https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[licenses]
# Permissive licenses only. The base policy is MIT / Apache-2.0 / BSD / ISC
# (per IMPLEMENTATION_PLAN.md T-I02); the remaining entries are equally
# permissive licenses that transitive dependencies in the tree carry.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "0BSD",          # BSD Zero Clause (public-domain-equivalent); via interprocess→recvmsg (tokio local-socket support the tarpc IPC transport uses)
    "CC0-1.0",       # public-domain dedication; via the `notify` file-watcher (daemon + web UI)
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
# An allow-list entry that no dependency currently carries is a harmless
# forward-declaration, not a failure: don't error when an allowed license isn't
# encountered in the tree (e.g. after a dep upgraded off Unicode-DFS-2016).
unused-allowed-license = "allow"
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
yanked = "deny"
# Add RUSTSEC IDs here only with justification.
ignore = [
    # Marvin Attack: potential RSA key-recovery via timing sidechannel. Pulled
    # only by the optional `github` feature (octocrab → jsonwebtoken → rsa) for
    # GitHub App JWT auth, which clove does not exercise in a setting where an
    # attacker can observe decryption timing. No fixed `rsa` release exists.
    "RUSTSEC-2023-0071",
    # `paste` is unmaintained (not a vulnerability). Pulled transitively by
    # `ratatui` (the `clove tui` browser); revisit on a ratatui bump.
    "RUSTSEC-2024-0436",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
