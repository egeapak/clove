[package]
name = "clove"
description = "clove: a fast, git-native, dependency-aware work-item tracker"
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
default-run = "clove"

[[bin]]
name = "clove"
path = "src/main.rs"

[dependencies]
clove-core.workspace = true
clove-index.workspace = true
clove-import.workspace = true   # M2 import/export/merge-driver (default features incl. `github`)
clap.workspace = true
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
camino.workspace = true
chrono.workspace = true
tempfile.workspace = true       # T-M04: atomic `export --out FILE` writes

[dev-dependencies]
assert_cmd.workspace = true
insta = { workspace = true, features = ["json"] }       # golden CLI snapshot tests (T-X01 acceptance gate)
tempfile.workspace = true
jsonschema.workspace = true       # T-CLI14: validate JSON output against v1 schema
