# Cross-compile build checks on a Linux agent for the two targets clove ships
# from Linux: macOS (arm64) and Windows (x86_64-gnu). Both compile AND link here;
# neither can RUN its tests on Linux (macOS needs a darwin agent; Windows-gnu
# binaries can be smoke-tested under Wine if desired, but unit tests still want a
# real runner). zigbuild can only target the GNU Windows ABI, not MSVC — that is
# the ABI we build/ship via cross-compilation (cargo-xwin would be needed for an
# MSVC cross-build). The gnu build requires the windows-sys `Win32_Security`
# feature (declared in clove/cloved Cargo.toml) so `CreateEventW` resolves.
#
# Uses the official cargo-zigbuild image (zig + a bundled macOS SDK).
# LICENCE NOTE: that image ships an Apple-licensed macOS SDK; relying on it on
# non-Apple CI hardware is the widely-used grey-area route (same as osxcross). The
# fully compliant alternative is to extract the SDK from your own Xcode and point
# SDKROOT at it. The embedded web UI here is the build.rs placeholder (no node in
# this image); real release artifacts with the SPA are built in release.yml.
when:
  - event: pull_request
  - event: push
    branch: [main, master]

steps:
  - name: macos-arm64
    image: ghcr.io/rust-cross/cargo-zigbuild:0.22.3
    environment:
      CARGO_TERM_COLOR: always
      CLOVE_SKIP_WEB_BUILD: '1'
    commands:
      - rustup target add aarch64-apple-darwin
      # `--features full` mirrors the shipped (release.yml) config so the GitHub /
      # git2 cross-compile — the historically fragile part — is verified here.
      - cargo zigbuild --release --target aarch64-apple-darwin -p clove -p cloved --features "clove/full cloved/full"
      - file target/aarch64-apple-darwin/release/clove
      # Informational size trend (release profile: fat LTO + cgu=1 + panic=abort + strip).
      - ls -lh target/aarch64-apple-darwin/release/clove target/aarch64-apple-darwin/release/cloved

  - name: windows-x86_64-gnu
    image: ghcr.io/rust-cross/cargo-zigbuild:0.22.3
    environment:
      CARGO_TERM_COLOR: always
      CLOVE_SKIP_WEB_BUILD: '1'
    commands:
      - rustup target add x86_64-pc-windows-gnu
      # `--features full` mirrors the shipped (release.yml) config.
      - cargo zigbuild --release --target x86_64-pc-windows-gnu -p clove -p cloved --features "clove/full cloved/full"
      - file target/x86_64-pc-windows-gnu/release/clove.exe
      # Informational size trend (release profile: fat LTO + cgu=1 + panic=abort + strip).
      - ls -lh target/x86_64-pc-windows-gnu/release/clove.exe target/x86_64-pc-windows-gnu/release/cloved.exe
