# macOS cross-compile build check on a Linux agent: compiles AND links the macOS
# binary. It cannot run macOS tests on Linux (that needs a darwin-labelled agent).
#
# No Windows leg here ON PURPOSE: zigbuild can only target x86_64-pc-windows-GNU,
# but clove ships the MSVC target, and the project decision is that Windows is
# verified on a REAL Windows runner (the old GitHub `daemon-windows` job), not via
# a cross-check. The gnu target in fact fails to build cloved (windows-sys feature
# unification differs from msvc: `CreateEventW` unresolved), so a cross-check would
# be a misleading red. Add a windows/amd64-labelled agent + its own workflow to
# restore native Windows coverage.
#
# Uses the official cargo-zigbuild image (zig + a bundled macOS SDK).
# LICENCE NOTE: that image ships an Apple-licensed macOS SDK; relying on it on
# non-Apple CI hardware is the widely-used grey-area route (same as osxcross). The
# fully compliant alternative is to extract the SDK from your own Xcode and point
# SDKROOT at it. The embedded web UI here is the build.rs placeholder (no node in
# this image); real release artifacts with the SPA are built in release.yml.
when:
  - event: pull_request
  - event: push
    branch: [main, master]

steps:
  - name: macos-arm64
    image: ghcr.io/rust-cross/cargo-zigbuild:0.22.3
    environment:
      CARGO_TERM_COLOR: always
      CLOVE_SKIP_WEB_BUILD: '1'
    commands:
      - rustup target add aarch64-apple-darwin
      - cargo zigbuild --release --target aarch64-apple-darwin -p clove -p cloved
      - file target/aarch64-apple-darwin/release/clove
