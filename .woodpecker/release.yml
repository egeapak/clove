# NOTE: GitHub Actions (.github/workflows/release.yml) is the canonical release
# path for this repo (origin is GitHub). This Woodpecker pipeline is kept as the
# self-hosted-forge variant (Gitea/Forgejo) and cross-compiles via zigbuild; it
# only runs if a Woodpecker server is wired to the repo.
#
# Tag-triggered: build shippable binaries entirely on Linux, each carrying the
# REAL embedded SvelteKit SPA — macOS universal2 (arm64 + x86_64) and Windows
# x86_64 (gnu ABI). All steps share the workspace:
#   1) node builds the SPA once into crates/clove-web/dist (the path build.rs embeds)
#   2+) zigbuild compiles each target with CLOVE_SKIP_WEB_BUILD=1, so build.rs
#       embeds that dist instead of the placeholder (and never shells out to npm).
# NB: the Windows build is the GNU ABI (not MSVC); it needs the windows-sys
# Win32_Security feature (declared in clove/cloved) to compile. The .exe links
# the mingw runtime — verify it runs on a clean Windows box before wide release.
when:
  - event: tag

steps:
  - name: build-spa
    image: node:22-bookworm
    commands:
      - cd crates/clove-web/web
      - npm ci
      - npm run build   # -> crates/clove-web/dist, picked up by clove-web/build.rs

  - name: macos-universal2
    image: ghcr.io/rust-cross/cargo-zigbuild:0.22.3
    environment:
      CARGO_TERM_COLOR: always
      CLOVE_SKIP_WEB_BUILD: '1'   # embed the dist from build-spa; do not run npm
    commands:
      - rustup target add aarch64-apple-darwin x86_64-apple-darwin
      # Ship the lean core plus the integration plugins (clove-sync-github,
      # clove-import-tk, clove-import-beads) so `clove sync github` / `clove import
      # tk|beads` work out of the box (the CLI resolves the sibling plugins).
      # `cloved/full` enables the daemon's dependency-free periodic-sync spawn
      # gate. Drop the plugin packages for a smaller integration-free bundle.
      - cargo zigbuild --release --target universal2-apple-darwin -p clove-cli -p cloved -p clove-sync-github -p clove-import-tk -p clove-import-beads --features "cloved/full"
      - file target/universal2-apple-darwin/release/clove
      # Informational size trend (release profile: fat LTO + cgu=1 + panic=abort + strip).
      - ls -lh target/universal2-apple-darwin/release/clove target/universal2-apple-darwin/release/cloved target/universal2-apple-darwin/release/clove-sync-github target/universal2-apple-darwin/release/clove-import-tk target/universal2-apple-darwin/release/clove-import-beads
      # Artifacts: target/universal2-apple-darwin/release/{clove,cloved,clove-sync-github,clove-import-tk,clove-import-beads}
      # They are unsigned; ad-hoc `codesign --sign -` or notarise on a Mac before
      # distributing to other machines (Gatekeeper will block an unsigned download).

  - name: windows-x86_64-gnu
    image: ghcr.io/rust-cross/cargo-zigbuild:0.22.3
    environment:
      CARGO_TERM_COLOR: always
      CLOVE_SKIP_WEB_BUILD: '1'   # embed the dist from build-spa; do not run npm
    commands:
      - rustup target add x86_64-pc-windows-gnu
      # See the macOS step: ship the core + the integration plugins.
      - cargo zigbuild --release --target x86_64-pc-windows-gnu -p clove-cli -p cloved -p clove-sync-github -p clove-import-tk -p clove-import-beads --features "cloved/full"
      - file target/x86_64-pc-windows-gnu/release/clove.exe
      # Informational size trend (release profile: fat LTO + cgu=1 + panic=abort + strip).
      - ls -lh target/x86_64-pc-windows-gnu/release/clove.exe target/x86_64-pc-windows-gnu/release/cloved.exe target/x86_64-pc-windows-gnu/release/clove-sync-github.exe target/x86_64-pc-windows-gnu/release/clove-import-tk.exe target/x86_64-pc-windows-gnu/release/clove-import-beads.exe
      # Artifacts: target/x86_64-pc-windows-gnu/release/{clove,cloved,clove-sync-github,clove-import-tk,clove-import-beads}.exe

  # PUBLISH — uncomment and adapt to your forge once a token secret exists:
  # - name: publish
  #   image: woodpeckerci/plugin-release      # for Gitea/Forgejo/GitHub releases
  #   settings:
  #     files:
  #       - target/universal2-apple-darwin/release/clove
  #       - target/universal2-apple-darwin/release/cloved
  #       - target/universal2-apple-darwin/release/clove-sync-github
  #       - target/universal2-apple-darwin/release/clove-import-tk
  #       - target/universal2-apple-darwin/release/clove-import-beads
  #       - target/x86_64-pc-windows-gnu/release/clove.exe
  #       - target/x86_64-pc-windows-gnu/release/cloved.exe
  #       - target/x86_64-pc-windows-gnu/release/clove-sync-github.exe
  #       - target/x86_64-pc-windows-gnu/release/clove-import-tk.exe
  #       - target/x86_64-pc-windows-gnu/release/clove-import-beads.exe
  #     title: ${CI_COMMIT_TAG}
  #     api_key:
  #       from_secret: release_token
