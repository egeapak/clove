# Mirrors the GitHub `test` job: fmt + clippy + test + bench-compile.
#
# PLATFORM COVERAGE: the GitHub matrix ran this on ubuntu/macos/windows. The
# Woodpecker docker backend runs Linux containers only, so this leg covers Linux.
# macOS/Windows are compile-checked in cross-build.yml; running *their* tests
# natively would need Woodpecker agents labelled with those platforms
# (`labels: {platform: darwin/amd64}` on the agent + a matching `when` here).
#
# CACHING: Woodpecker has no built-in rust-cache. The four steps below share one
# workspace, so they reuse a single ./target across the run. For cross-pipeline
# caching wrap ~/.cargo and ./target with woodpeckerci/plugin-cache (S3/filesystem)
# or mount a persistent agent volume.

variables:
  - &rust_image 'rust:bookworm'
  - &cargo_env
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: '1'
    # Drop debuginfo + incremental in CI: no debugger is attached and the test
    # harness still reports the failing test + assertion without it. Big artifact
    # shrink and ~30% faster compiles (deps build under dev, test bins under test;
    # set both). Swap a profile to "line-tables-only" if you want file:line in
    # panic backtraces. `incremental/` is pure waste on a clean checkout.
    CARGO_INCREMENTAL: '0'
    CARGO_PROFILE_DEV_DEBUG: '0'
    CARGO_PROFILE_TEST_DEBUG: '0'

when:
  - event: pull_request
  - event: push
    branch: [main, master]

steps:
  - name: fmt
    image: *rust_image
    environment: *cargo_env
    commands:
      - cargo fmt --all --check

  - name: clippy
    image: *rust_image
    environment: *cargo_env
    commands:
      # --all-features covers clove-import's `github` network layer (used by the
      # clove-sync-github plugin); the default/lean arm is what `cargo install` /
      # from-source builds produce. The plugin crate lints on both arms.
      - cargo clippy --workspace --all-targets --all-features -- -D warnings
      - cargo clippy --workspace --all-targets -- -D warnings

  - name: test
    image: *rust_image
    environment: *cargo_env
    commands:
      # --all-features exercises clove-import's github mapping/network tests; the
      # sync_github mock suite (in clove-cli) builds the clove-sync-github plugin
      # via escargot and runs regardless, proving end-to-end plugin dispatch.
      - cargo test --workspace --all-features

  - name: bench-compile
    image: *rust_image
    environment: *cargo_env
    commands:
      - cargo bench --workspace --no-run

  # FEATURE TRIMS: guard that both the default build (lean CLI: mcp; daemon:
  # git-sync) and the leanest `--no-default-features` arm (CLI: no mcp; daemon: no
  # git-sync/github-sync) keep compiling — these are first-class shipping configs.
  # GitHub sync is no longer a feature of these crates; it is the separately-built
  # clove-sync-github plugin. cargo check is enough; the opt-out arms only resolve.
  - name: feature-combos
    image: *rust_image
    environment: *cargo_env
    commands:
      - cargo check -p clove-cli                       # default (lean: mcp)
      - cargo check -p clove-cli --no-default-features   # leanest (no mcp)
      - cargo check -p cloved                        # default (git-sync)
      - cargo check -p cloved --no-default-features   # leanest (no git-sync/github-sync)

  # Informational native (linux x86_64) size trend for the shipped binaries.
  # Release profile is fat LTO + cgu=1 + panic=abort + strip (root Cargo.toml).
  # Build the lean core AND the clove-sync-github plugin so the GitHub-sync size
  # cost is visible — it now lives entirely in the plugin (this is the
  # authoritative native number; cross-build.yml reports the cross sizes).
  - name: release-size
    image: *rust_image
    environment: *cargo_env
    commands:
      - cargo build --release -p clove-cli -p cloved
      - echo "== lean core =="; ls -lh target/release/clove target/release/cloved
      - cargo build --release -p clove-sync-github
      - echo "== clove-sync-github plugin =="; ls -lh target/release/clove-sync-github
