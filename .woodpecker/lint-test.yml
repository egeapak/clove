# Mirrors the GitHub `test` job: fmt + clippy + test + bench-compile.
#
# PLATFORM COVERAGE: the GitHub matrix ran this on ubuntu/macos/windows. The
# Woodpecker docker backend runs Linux containers only, so this leg covers Linux.
# macOS/Windows are compile-checked in cross-build.yml; running *their* tests
# natively would need Woodpecker agents labelled with those platforms
# (`labels: {platform: darwin/amd64}` on the agent + a matching `when` here).
#
# CACHING: Woodpecker has no built-in rust-cache. The four steps below share one
# workspace, so they reuse a single ./target across the run. For cross-pipeline
# caching wrap ~/.cargo and ./target with woodpeckerci/plugin-cache (S3/filesystem)
# or mount a persistent agent volume.

variables:
  - &rust_image 'rust:bookworm'
  - &cargo_env
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: '1'
    # Drop debuginfo + incremental in CI: no debugger is attached and the test
    # harness still reports the failing test + assertion without it. Big artifact
    # shrink and ~30% faster compiles (deps build under dev, test bins under test;
    # set both). Swap a profile to "line-tables-only" if you want file:line in
    # panic backtraces. `incremental/` is pure waste on a clean checkout.
    CARGO_INCREMENTAL: '0'
    CARGO_PROFILE_DEV_DEBUG: '0'
    CARGO_PROFILE_TEST_DEBUG: '0'

when:
  - event: pull_request
  - event: push
    branch: [main, master]

steps:
  - name: fmt
    image: *rust_image
    environment: *cargo_env
    commands:
      - cargo fmt --all --check

  - name: clippy
    image: *rust_image
    environment: *cargo_env
    commands:
      - cargo clippy --workspace --all-targets -- -D warnings

  - name: test
    image: *rust_image
    environment: *cargo_env
    commands:
      - cargo test --workspace

  - name: bench-compile
    image: *rust_image
    environment: *cargo_env
    commands:
      - cargo bench --workspace --no-run

  # FEATURE TRIMS: default-on features (github, mcp, git-sync) are trimmed for
  # binary size, and several deps opt out of their own default features. The
  # `--no-default-features` build paths are first-class shipping configs (lean CLI
  # with no GitHub/MCP; daemon with no vendored libgit2), so guard they keep
  # compiling. cargo check is enough — the opt-out arms only need to resolve.
  - name: feature-combos
    image: *rust_image
    environment: *cargo_env
    commands:
      - cargo check -p clove --no-default-features
      - cargo check -p cloved --no-default-features
