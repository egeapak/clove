# Mirrors the GitHub `test` job: fmt + clippy + test + bench-compile.
#
# PLATFORM COVERAGE: the GitHub matrix ran this on ubuntu/macos/windows. The
# Woodpecker docker backend runs Linux containers only, so this leg covers Linux.
# macOS/Windows are compile-checked in cross-build.yml; running *their* tests
# natively would need Woodpecker agents labelled with those platforms
# (`labels: {platform: darwin/amd64}` on the agent + a matching `when` here).
#
# CACHING: Woodpecker has no built-in rust-cache. The four steps below share one
# workspace, so they reuse a single ./target across the run. For cross-pipeline
# caching wrap ~/.cargo and ./target with woodpeckerci/plugin-cache (S3/filesystem)
# or mount a persistent agent volume.

variables:
  - &rust_image 'rust:bookworm'
  - &cargo_env
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: '1'
    # Drop debuginfo + incremental in CI: no debugger is attached and the test
    # harness still reports the failing test + assertion without it. Big artifact
    # shrink and ~30% faster compiles (deps build under dev, test bins under test;
    # set both). Swap a profile to "line-tables-only" if you want file:line in
    # panic backtraces. `incremental/` is pure waste on a clean checkout.
    CARGO_INCREMENTAL: '0'
    CARGO_PROFILE_DEV_DEBUG: '0'
    CARGO_PROFILE_TEST_DEBUG: '0'

when:
  - event: pull_request
  - event: push
    branch: [main, master]

steps:
  - name: fmt
    image: *rust_image
    environment: *cargo_env
    commands:
      - cargo fmt --all --check

  - name: clippy
    image: *rust_image
    environment: *cargo_env
    commands:
      # github/github-sync are now opt-out (see the feature notes below), so lint
      # both arms: the full arm (--all-features) covers the GitHub code, and the
      # default/lean arm is what `cargo install` / from-source builds produce.
      - cargo clippy --workspace --all-targets --all-features -- -D warnings
      - cargo clippy --workspace --all-targets -- -D warnings

  - name: test
    image: *rust_image
    environment: *cargo_env
    commands:
      # --all-features so the github-gated tests (sync_github mock server,
      # clove-import mapping) still run now that `github` is opt-out.
      - cargo test --workspace --all-features

  - name: bench-compile
    image: *rust_image
    environment: *cargo_env
    commands:
      - cargo bench --workspace --no-run

  # FEATURE TRIMS: `github`/`github-sync` are opt-out (not in default) so the
  # default build is lean; `full` re-enables them. Guard that both the default
  # (lean CLI: mcp, no github; daemon: git-sync, no github-sync) and the leanest
  # `--no-default-features` arm (no github/mcp; daemon no git-sync/github-sync)
  # keep compiling — these are first-class shipping configs. cargo check is
  # enough; the opt-out arms only need to resolve.
  - name: feature-combos
    image: *rust_image
    environment: *cargo_env
    commands:
      - cargo check -p clove-cli                       # default (lean: mcp, no github)
      - cargo check -p clove-cli --no-default-features   # leanest (no github, no mcp)
      - cargo check -p cloved                        # default (git-sync, no github-sync)
      - cargo check -p cloved --no-default-features   # leanest (no git-sync/github-sync)

  # Informational native (linux x86_64) size trend for the shipped binaries.
  # Release profile is fat LTO + cgu=1 + panic=abort + strip (root Cargo.toml).
  # Build BOTH the default lean binary and the `--features full` binary so the
  # GitHub-feature size cost is visible (this is the authoritative native number;
  # cross-build.yml reports the darwin/windows-gnu cross-compiled sizes).
  - name: release-size
    image: *rust_image
    environment: *cargo_env
    commands:
      - cargo build --release -p clove-cli -p cloved
      - echo "== lean (default) =="; ls -lh target/release/clove target/release/cloved
      - cargo build --release -p clove-cli -p cloved --features "clove-cli/full cloved/full"
      - echo "== full (--features full) =="; ls -lh target/release/clove target/release/cloved
