name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy
        # --all-features covers clove-import's `github` network layer (enabled by
        # the clove-sync-github plugin); the second, default arm is the lean core
        # that `cargo install clove-cli` builds. The clove-sync-github plugin crate
        # is in the workspace, so both arms lint it too.
        run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        # --all-features exercises clove-import's github mapping/network tests. The
        # sync_github mock suite lives in clove-cli and builds the clove-sync-github
        # plugin via escargot, so it runs on both arms (proving clove sync github
        # dispatches to the plugin end-to-end).
        run: |
          cargo test --workspace --all-features
          cargo test -p clove-cli
      - name: Benchmarks compile (T-X01)
        run: cargo bench --workspace --no-run

  web-frontend:
    name: web frontend (check + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/clove-web/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/clove-web/web/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Svelte check
        run: npm run check
      - name: Unit tests (vitest)
        run: npm run test

  perf-gates:
    name: perf gates (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Enforce the DESIGN §13.1 file-scan budgets — these only assert in
      # optimized builds (debug is several times slower).
      - name: Perf gate tests
        run: cargo test --release -p clove-core --test perf_gates

  fuzz:
    name: fuzz (30s/target)
    runs-on: ubuntu-latest
    # The repo-root rust-toolchain.toml pins `stable`, which rustup honors over
    # the action's default for any cargo invocation in the tree. cargo-fuzz needs
    # nightly (`-Z` sanitizer flags), so force the toolchain explicitly here.
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      # T-X02 regression: each target runs 30s against its committed seed corpus.
      - name: Fuzz parse_item_file
        run: cargo fuzz run parse_item_file -- -max_total_time=30
      - name: Fuzz parse_dep_list
        run: cargo fuzz run parse_dep_list -- -max_total_time=30
      - name: Fuzz merge_driver
        run: cargo fuzz run merge_driver -- -max_total_time=30
      - name: Fuzz import_tk
        run: cargo fuzz run import_tk -- -max_total_time=30
      - name: Fuzz import_beads
        run: cargo fuzz run import_beads -- -max_total_time=30

  daemon-windows:
    name: daemon (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Windows daemon gate: compile the Windows named-event
      # shutdown path (cloved CreateEventW + `clove daemon stop` OpenEventW/SetEvent)
      # and run the platform-agnostic daemon unit tests. The Unix-only socket/
      # signal integration tests are `#![cfg(unix)]` and are exercised on the
      # ubuntu/macos matrix.
      - name: Build daemon (windows shutdown path)
        run: cargo build -p cloved -p clove-cli
      - name: Daemon unit tests
        # `cloved` is a binary crate (no lib target), so its unit tests live in
        # the bin and run with --bins; --lib finds no targets and errors.
        run: cargo test -p cloved --bins

  feature-matrix:
    name: feature combos + release size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Default-on features (mcp, git-sync) are trimmed aggressively for binary
      # size, and several deps now opt out of their own default features. The
      # opt-out build paths are first-class shipping configs (a lean CLI with no
      # MCP, a daemon with no vendored libgit2), so guard that they keep compiling
      # — the `--no-default-features` arms must still resolve cleanly. (GitHub sync
      # is no longer a feature of these crates; it is the clove-sync-github plugin.)
      - name: clove without mcp (lean CLI)
        run: cargo check -p clove-cli --no-default-features
      - name: cloved without git-sync
        run: cargo check -p cloved --no-default-features
      # Informational: track the shipped binary size. The release profile is fat
      # LTO + codegen-units=1 + panic=abort + strip (see root Cargo.toml). cargo
      # forces the test/bench harness back to unwind, so `cargo test --release`
      # and `cargo bench --no-run` are unaffected by panic=abort.
      - name: Release binary size
        # Build the lean core AND the clove-sync-github plugin so the GitHub-sync
        # size cost is visible — it now lives entirely in the separately-installed
        # plugin, not in `clove`/`cloved`.
        run: |
          cargo build --release -p clove-cli -p cloved
          echo "== lean core =="; ls -l target/release/clove target/release/cloved
          cargo build --release -p clove-sync-github
          echo "== clove-sync-github plugin =="; ls -l target/release/clove-sync-github

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # License/advisory/ban checks are platform-independent — run once.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
