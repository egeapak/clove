name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Benchmarks compile (T-X01)
        run: cargo bench --workspace --no-run

  web-frontend:
    name: web frontend (check + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/clove-web/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/clove-web/web/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Svelte check
        run: npm run check
      - name: Unit tests (vitest)
        run: npm run test

  perf-gates:
    name: perf gates (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Enforce the DESIGN §13.1 file-scan budgets — these only assert in
      # optimized builds (debug is several times slower).
      - name: Perf gate tests
        run: cargo test --release -p clove-core --test perf_gates

  fuzz:
    name: fuzz (30s/target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      # T-X02 regression: each target runs 30s against its committed seed corpus.
      - name: Fuzz parse_item_file
        run: cargo fuzz run parse_item_file -- -max_total_time=30
      - name: Fuzz parse_dep_list
        run: cargo fuzz run parse_dep_list -- -max_total_time=30
      - name: Fuzz merge_driver
        run: cargo fuzz run merge_driver -- -max_total_time=30
      - name: Fuzz import_tk
        run: cargo fuzz run import_tk -- -max_total_time=30
      - name: Fuzz import_beads
        run: cargo fuzz run import_beads -- -max_total_time=30
      - name: Fuzz ipc_frame
        run: cargo fuzz run ipc_frame -- -max_total_time=30

  daemon-windows:
    name: daemon (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # M3 gate M3-G03 (VERIFICATION_PLAN §9): compile the Windows named-event
      # shutdown path (cloved CreateEventW + `clove daemon stop` OpenEventW/SetEvent)
      # and run the platform-agnostic daemon unit tests. The Unix-only socket/
      # signal integration tests are `#![cfg(unix)]` and are exercised on the
      # ubuntu/macos matrix.
      - name: Build daemon (windows shutdown path)
        run: cargo build -p cloved -p clove
      - name: Daemon unit tests
        run: cargo test -p cloved --lib

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # License/advisory/ban checks are platform-independent — run once.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
